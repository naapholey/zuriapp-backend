name: CI/CD K3s Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Build and Push Docker Image
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build and Push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }}
          ${{ secrets.DOCKER_USERNAME }}/my-app:latest

    # 2. Update Kubernetes Manifests with the new Image Tag
    - name: Update Image Tag in Manifest
      run: |
        sed -i 's|DOCKER_IMAGE_PLACEHOLDER|${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }}|g' k8s/deployment.yaml

    # 3. Deploy to K3s over SSH / Kubeconfig
    - name: Deploy to K3s Cluster
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Create deployment files dynamically or pull repository on server
          mkdir -p ~/k8s-deployments
          cat << 'EOF' > ~/k8s-deployments/deployment.yaml
          ${{ steps.update_manifest.outputs.manifest }}
          EOF
          
          
    # Streamlined Secure Deployment using kubectl directly inside GitHub Actions
    - name: Setup Kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: Configure Kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBECONFIG_DATA }}" | base64 --decode > ~/.kube/config
        chmod 600 ~/.kube/config

    - name: Apply Manifests to K3s
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/ingress.yaml
        kubectl rollout status deployment/my-app-deployment
